<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>EcoChange Helper</title>
</head>
<body>
    <div class="container">
        <h1>EcoChange 🌍</h1>
        <p>See your impact in 60 seconds.</p>

        <form action="/calculate" method="POST">
            
            <label>What city do you live in?</label>
            <input type="text" name="city" placeholder="e.g. Soweto" required>

            <label>How do you usually travel?</label>
            <select name="transport">
                <option value="car">Private Car</option>
                <option value="bus">Taxi/Bus</option>
                <option value="walking">Walking/Cycling</option>
            </select>

            <button type="submit" class="btn-submit">Analyze My Impact</button>
        </form>
    </div>
</body>
</html>
