<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Climate AI Helper</title>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="max-w-2xl mx-auto py-10 px-4">
        <h1 class="text-4xl font-bold text-green-400 mb-4 text-center">Climate AI Helper 🌍</h1>
        
        <form method="POST" class="bg-gray-800 p-6 rounded-lg shadow-xl border border-gray-700">
            <label class="block mb-2 text-sm font-medium">Your City</label>
            <input type="text" name="city" class="w-full p-2 mb-4 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-green-500" placeholder="Enter city name...">
            
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition duration-300">
                Calculate Impact
            </button>
        </form>

        {% if result %}
        <div class="mt-8 p-6 bg-green-900/30 border border-green-500 rounded-lg">
            <h2 class="text-2xl font-bold mb-2">Results for {{ result.city }}</h2>
            <p class="mb-4 text-gray-300"><span class="font-bold text-green-400">Local Risk:</span> {{ result.risk }}</p>
            <h3 class="font-bold text-lg mb-2">Top 3 Actions:</h3>
            <ul class="list-disc ml-5">
                {% for tip in result.tips %}
                <li class="mb-1">{{ tip }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</body>
</html>
