<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EcoChange Helper</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>EcoChange 🌍</h1>
        <p>Understand your environmental impact in 60 seconds.</p>
        <section class="glossary">
            <h3>Quick Guide</h3>
            <p><strong>PM2.5:</strong> Tiny dust/smoke that enters your lungs. High levels = bad air.</p>
            <p><strong>Ozone:</strong> Smog at ground level. It makes breathing feel heavy.</p>
            <p><strong>2030 Prediction:</strong> Our AI’s estimate of how hot and toxic your city will be in 4 years.</p>
        </section>

        <form action="/calculate" method="POST">    
        <label for="city">What city do you live in?</label>
        <input type="text" id="city" name="city" placeholder="e.g. Soweto or Johannesburg" required>

            <label for="transport">How do you usually travel?</label>
            <select id="transport" name="transport">
                <option value="car">Private Car (Petrol/Diesel)</option>
                <option value="electric">Electric Vehicle</option>
                <option value="public">Taxi / Bus / Train</option>
                <option value="walking">Walking / Cycling</option>
            </select>

            <label for="diet">What is your primary diet?</label>
            <select id="diet" name="diet">
                <option value="meat_heavy">Meat-heavy (Daily meat)</option>
                <option value="balanced">Balanced (Mixed diet)</option>
                <option value="vegetarian">Vegetarian</option>
                <option value="vegan">Vegan</option>
            </select>

            <label for="energy">What is your main energy source?</label>
            <select id="energy" name="energy">
                <option value="fossil">National Grid (Coal/Eskom)</option>
                <option value="mixed">Mixed (Grid + Solar/Inverter)</option>
                <option value="renewable">100% Renewable / Solar</option>
            </select>

            <label for="electricity">Monthly Electricity Usage (kWh)</label>
            <input type="number" id="electricity" name="electricity" placeholder="Check your prepaid meter or bill" min="0">

            <button type="submit" class="btn-submit">Analyze My Impact →</button>
        </form>

    </div>
</body>
</html>
